<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Notice Note Mobile</title>
  <link rel="stylesheet" href="./styles.css?v=8">
</head>
<body>
  <main class="app-shell">
    <section id="contentPanel" hidden>
      <div class="content-tools">
        <div class="mobile-toolbar">
          <div>
            <h1>Notice Note</h1>
          </div>
          <div class="toolbar-actions">
            <button id="scanPairingButton" class="toolbar-action-button" type="button" aria-label="扫码设置">▣</button>
            <button id="connectionSettingsButton" class="toolbar-action-button" type="button" aria-label="连接配置">⚙</button>
            <button id="refreshButton" class="refresh-button" type="button" aria-label="刷新笔记">↻</button>
          </div>
        </div>
        <label class="search-box">
          <span aria-hidden="true">⌕</span>
          <input id="searchInput" type="search" placeholder="标题、正文预览、文件夹">
        </label>
      </div>

      <nav id="pathBar" class="path-bar" aria-label="当前位置"></nav>
      <div id="statusText" class="status-text">正在连接桌面端...</div>
      <div id="noteList" class="note-list"></div>
    </section>

    <section id="noteDetailPanel" class="note-page" hidden>
      <div class="note-page-bar">
        <button id="noteBackButton" class="path-back" type="button">← 返回</button>
        <p id="noteFolder" class="note-page-path"></p>
        <button id="editNoteButton" class="note-edit-button" type="button" title="编辑笔记" aria-label="编辑笔记" hidden>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M4 20h4l11-11-4-4L4 16v4Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
            <path d="m13.8 6.2 4 4" stroke="currentColor" stroke-width="1.8"/>
          </svg>
        </button>
      </div>
      <article class="note-page-card">
        <div id="noteView">
          <h2 id="noteTitle"></h2>
          <div id="noteContent" class="markdown-body"></div>
        </div>
        <form id="noteEditor" class="note-editor" hidden>
          <label class="note-editor-field">
            <span>标题</span>
            <input id="noteTitleInput" type="text" maxlength="200" autocomplete="off">
          </label>
          <label class="note-editor-field">
            <span>正文</span>
            <textarea id="noteContentInput" rows="18" spellcheck="true"></textarea>
          </label>
          <p id="noteEditStatus" class="note-edit-status" role="status"></p>
          <div class="note-editor-actions">
            <button id="cancelNoteEditButton" class="note-editor-cancel" type="button">取消</button>
            <button id="saveNoteEditButton" class="note-editor-save" type="submit">保存</button>
          </div>
        </form>
      </article>
    </section>
  </main>

  <dialog id="connectionDialog" class="connection-dialog">
    <form method="dialog" class="connection-card">
      <div class="connection-heading">
        <div>
          <h2 id="connectionDialogTitle">连接配置</h2>
          <p id="connectionDialogDescription">填写电脑的 EasyTier 服务地址和访问令牌。</p>
        </div>
        <button id="closeConnectionDialogButton" class="dialog-close-button" type="button" aria-label="关闭">×</button>
      </div>
      <section id="manualConnectionPanel">
        <label>
          <span>服务地址</span>
          <input id="serverInput" type="url" placeholder="例如：http://10.144.144.1:39271">
        </label>
        <label>
          <span>访问令牌</span>
          <span class="token-input-wrap">
            <input id="tokenInput" type="password" placeholder="粘贴 token">
            <button id="toggleTokenVisibilityButton" class="token-visibility-button" type="button" aria-label="显示访问令牌">👁</button>
          </span>
        </label>
        <button id="saveConnectionButton" type="button">保存并进入</button>
      </section>
      <section id="scannerPanel" class="scanner-panel" hidden>
        <video id="scannerVideo" playsinline muted></video>
        <p id="scannerStatus">将二维码放入取景框</p>
        <button id="stopScanButton" type="button">停止扫码</button>
      </section>
    </form>
  </dialog>

  <div id="imageLightbox" class="image-lightbox" role="dialog" aria-modal="true" aria-label="图片预览" hidden>
    <div class="image-lightbox-zoom-controls" aria-label="图片缩放">
      <button id="zoomOutImageLightboxButton" class="image-lightbox-control" type="button" aria-label="缩小图片">−</button>
      <button id="zoomInImageLightboxButton" class="image-lightbox-control" type="button" aria-label="放大图片">+</button>
    </div>
    <button id="closeImageLightboxButton" class="image-lightbox-close" type="button" aria-label="关闭图片预览">×</button>
    <div id="imageLightboxStage" class="image-lightbox-stage">
      <img id="imageLightboxImage" class="image-lightbox-image" alt="">
    </div>
  </div>

  <script src="./app.js?v=8"></script>
</body>
</html>
