<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notice Note</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <div class="brand-actions">
          <button id="refreshButton" class="toolbar-btn" type="button" title="刷新列表">
            <svg width="17" height="17" viewBox="0 0 20 20" fill="none" aria-hidden="true">
              <path d="M16.2 8a6.5 6.5 0 1 0 .1 4.2" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
              <path d="M16.2 3.8V8h-4.1" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
          <button id="locateCurrentFileButton" class="toolbar-btn" type="button" title="定位当前文件" aria-label="定位当前文件" disabled>
            <svg width="17" height="17" viewBox="0 0 20 20" fill="none" aria-hidden="true">
              <circle cx="10" cy="10" r="5" stroke="currentColor" stroke-width="1.5"/>
              <circle cx="10" cy="10" r="1.6" fill="currentColor"/>
              <path d="M10 2v2.2M10 15.8V18M2 10h2.2M15.8 10H18" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
          </button>
          <div class="new-menu">
            <button id="newNoteButton" class="toolbar-btn" type="button" title="新建">
              <svg width="17" height="17" viewBox="0 0 20 20" fill="none" aria-hidden="true">
                <path d="M5 2.8h7l3 3v11.4H5z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
                <path d="M12 2.8v3h3M10 8.5v5M7.5 11h5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
            <div id="newMenuDropdown" class="new-menu-dropdown">
              <button id="newNoteOption" class="new-menu-item">新建笔记</button>
              <button id="newFolderOption" class="new-menu-item">新建文件夹</button>
            </div>
          </div>
        </div>
        <button id="toggleSidebarButton" class="toolbar-btn" type="button" title="隐藏笔记列表" aria-label="隐藏笔记列表">
          <svg width="17" height="17" viewBox="0 0 20 20" fill="none" aria-hidden="true">
            <rect x="2.5" y="3" width="15" height="14" rx="3" stroke="currentColor" stroke-width="1.4"/>
            <path d="M7.2 3.5v13M12.4 7.2 9.6 10l2.8 2.8" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
      <div class="sidebar-body">
        <nav class="library-view-switcher" aria-label="文件列表筛选">
          <button id="showAllFilesButton" class="library-view-button is-active" type="button" title="查看全部文件" aria-label="查看全部文件">
            <svg width="17" height="17" viewBox="0 0 18 18" fill="none" aria-hidden="true">
              <path d="M2.5 3.5h5l1.5 1.5h6.5v9.5h-13z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/>
              <path d="M2.5 7h13" stroke="currentColor" stroke-width="1.3"/>
            </svg>
            <span>全部</span>
          </button>
          <button id="showReminderFilesButton" class="library-view-button" type="button" title="只看提醒文件" aria-label="只看提醒文件">
            <svg width="17" height="17" viewBox="0 0 18 18" fill="none" aria-hidden="true">
              <path d="M5 2.5h8v13l-4-2.7L5 15.5z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/>
            </svg>
            <span>提醒</span>
          </button>
          <button id="showReminderCalendarButton" class="library-view-button" type="button" title="查看提醒日历" aria-label="查看提醒日历">
            <svg width="17" height="17" viewBox="0 0 18 18" fill="none" aria-hidden="true">
              <rect x="2.5" y="3.5" width="13" height="12" rx="2" stroke="currentColor" stroke-width="1.3"/>
              <path d="M5.5 2v3M12.5 2v3M2.5 7h13" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
              <circle cx="6" cy="10" r=".8" fill="currentColor"/><circle cx="9" cy="10" r=".8" fill="currentColor"/><circle cx="12" cy="10" r=".8" fill="currentColor"/>
            </svg>
            <span>日历</span>
          </button>
          <button id="settingsButton" class="library-view-button library-settings-button" type="button" title="设置" aria-label="设置">
            <svg width="17" height="17" viewBox="0 0 20 20" fill="none" aria-hidden="true">
              <path d="M8.7 2.3h2.6l.5 2a6 6 0 0 1 1.2.7l2-.6 1.3 2.2-1.5 1.4a6 6 0 0 1 0 1.4l1.5 1.4-1.3 2.2-2-.6a6 6 0 0 1-1.2.7l-.5 2H8.7l-.5-2a6 6 0 0 1-1.2-.7l-2 .6-1.3-2.2 1.5-1.4a6 6 0 0 1 0-1.4L3.7 6.6 5 4.4l2 .6a6 6 0 0 1 1.2-.7z" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/>
              <circle cx="10" cy="8.7" r="2.2" stroke="currentColor" stroke-width="1.2"/>
            </svg>
            <span>设置</span>
          </button>
        </nav>
        <div class="sidebar-list-pane">
          <div class="note-list-toolbar">
            <div class="breadcrumb" id="breadcrumb">
              <button class="breadcrumb-item active" data-folder-id="">全部文件</button>
            </div>
          </div>
          <div id="noteList" class="note-list"></div>
        </div>
      </div>
      <button id="showSidebarButton" class="sidebar-open-button collapsed-sidebar-button" type="button" title="显示笔记列表" aria-label="显示笔记列表">
        <svg width="17" height="17" viewBox="0 0 20 20" fill="none" aria-hidden="true">
          <rect x="2.5" y="2.5" width="15" height="15" rx="3" stroke="currentColor" stroke-width="1.35"/>
          <path d="M7 3v14" stroke="currentColor" stroke-width="1.35"/>
          <path d="m11 7 3 3-3 3" stroke="currentColor" stroke-width="1.35" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </aside>

    <main class="workspace">
      <div class="workspace-tabs-bar">
        <div id="workspaceTabs" class="workspace-tabs"></div>
        <div class="notification-center">
          <button id="notificationBell" class="notification-bell" type="button" title="提醒通知" aria-label="提醒通知">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M6.5 9.5a5.5 5.5 0 0 1 11 0c0 6 2.5 6.5 2.5 6.5H4s2.5-.5 2.5-6.5Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
              <path d="M9.5 19a2.8 2.8 0 0 0 5 0" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
            </svg>
            <span id="notificationDot" class="notification-dot" hidden></span>
          </button>
          <section id="notificationPanel" class="notification-panel" hidden>
            <div class="notification-panel-heading">提醒通知</div>
            <div id="notificationList" class="notification-list"></div>
          </section>
        </div>
      </div>
      <div id="viewerSearchBar" class="viewer-search-bar" hidden>
        <input id="viewerSearchInput" type="search" placeholder="在文档中搜索" autocomplete="off">
        <span id="viewerSearchCount" class="viewer-search-count">0 / 0</span>
        <button id="viewerSearchPrevious" type="button" title="上一个匹配项" aria-label="上一个匹配项">↑</button>
        <button id="viewerSearchNext" type="button" title="下一个匹配项" aria-label="下一个匹配项">↓</button>
        <button id="viewerSearchClose" type="button" title="关闭搜索" aria-label="关闭搜索">×</button>
      </div>
      <div class="workspace-content">
      <section class="editor-panel">
        <div id="editorTopbar" class="topbar">
          <input id="titleInput" class="title-input" placeholder="笔记标题">
          <button id="openReminderConfigButton" class="secondary-button reminder-trigger" type="button">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M6.5 9.5a5.5 5.5 0 0 1 11 0c0 6 2.5 6.5 2.5 6.5H4s2.5-.5 2.5-6.5Z" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/>
              <path d="M9.5 19a2.8 2.8 0 0 0 5 0" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
            </svg>
            <span>提醒</span>
            <span id="reminderButtonCount" class="reminder-trigger-count" hidden>0</span>
          </button>
          <button id="insertImageButton" class="secondary-button">插入图片</button>
          <button id="deleteNoteButton" class="secondary-button danger-button">删除</button>
          <button id="saveButton" class="primary-button">保存</button>
        </div>

        <div id="contentShell" class="content-shell">
          <div id="editorRoot" class="live-editor"></div>
        </div>

      </section>
      <section id="pdfViewer" class="pdf-viewer" hidden>
        <div class="topbar pdf-topbar">
          <div class="pdf-file-icon" aria-hidden="true">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
              <path d="M6 2.75h8l4 4v14.5H6z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
              <path d="M14 2.75v4h4" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
              <path d="M8.5 16.5h7M8.5 13h7M8.5 9.5h3.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
            </svg>
          </div>
          <div class="pdf-heading-copy">
            <h1 id="pdfTitle"></h1>
            <p id="pdfMeta"></p>
          </div>
          <span class="pdf-type-pill">PDF</span>
        </div>
        <div class="pdf-content-shell">
          <div class="pdf-document-card">
            <div class="pdf-document-bar">
              <div class="pdf-location">
                <span class="pdf-path-label">文件位置</span>
                <span class="pdf-path" id="pdfPath"></span>
              </div>
              <div class="pdf-view-controls">
                <button id="pdfOutlineToggle" class="pdf-outline-toggle" type="button" title="显示或隐藏目录" aria-label="显示或隐藏目录">目录</button>
                <span id="pdfPageCount" class="pdf-page-count"></span>
                <button id="pdfZoomOut" type="button" title="缩小 PDF" aria-label="缩小 PDF">−</button>
                <span id="pdfZoomValue" class="pdf-zoom-value">100%</span>
                <button id="pdfZoomIn" type="button" title="放大 PDF" aria-label="放大 PDF">＋</button>
              </div>
            </div>
            <div class="pdf-document-body">
              <aside id="pdfOutline" class="pdf-outline">
                <div class="pdf-outline-heading">目录</div>
                <nav id="pdfOutlineList" class="pdf-outline-list" aria-label="PDF 目录"></nav>
              </aside>
              <div id="pdfPages" class="pdf-pages" aria-label="PDF 预览"></div>
            </div>
          </div>
        </div>
      </section>
      <section id="fileViewer" class="file-viewer" hidden>
        <div class="topbar file-viewer-topbar">
          <div id="fileViewerIcon" class="file-viewer-icon" aria-hidden="true"></div>
          <div class="file-viewer-heading">
            <h1 id="fileViewerTitle"></h1>
            <p id="fileViewerMeta"></p>
          </div>
          <span id="fileViewerType" class="file-viewer-type"></span>
        </div>
        <div class="file-viewer-path-row">
          <span>文件位置</span>
          <code id="fileViewerPath"></code>
        </div>
        <div id="fileViewerContent" class="file-viewer-content"></div>
      </section>
      </div>
    </main>

    <dialog id="reminderDialog" class="reminder-dialog">
      <form method="dialog" class="reminder-manager-card">
        <header class="reminder-manager-heading">
          <div class="reminder-manager-icon" aria-hidden="true">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
              <path d="M6.5 9.5a5.5 5.5 0 0 1 11 0c0 6 2.5 6.5 2.5 6.5H4s2.5-.5 2.5-6.5Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
              <path d="M9.5 19a2.8 2.8 0 0 0 5 0" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
            </svg>
          </div>
          <div class="reminder-manager-heading-copy">
            <h2>提醒管理</h2>
            <p id="reminderDialogNoteTitle">为当前笔记安排提醒</p>
          </div>
          <button id="closeReminderDialogButton" class="reminder-manager-close" type="button" title="关闭" aria-label="关闭">×</button>
        </header>

        <section class="reminder-create-card">
          <div class="reminder-create-heading">
            <div>
              <h3>添加提醒日期</h3>
              <p>每天将在 09:30 和 15:00 通知</p>
            </div>
          </div>
          <div class="reminder-form">
            <input id="reminderInput" type="date" aria-label="提醒日期">
            <button id="addReminderButton" class="primary-button" type="button">添加提醒</button>
          </div>
          <button id="autoReminderButton" class="reminder-quick-add" type="button">
            <span>一键添加常用日期</span>
            <small>明天、下周、下个月</small>
          </button>
        </section>

        <section class="reminder-manager-list-section">
          <div class="reminder-list-heading">
            <h3>当前提醒</h3>
            <span id="reminderDialogCount">0 个</span>
          </div>
          <div id="reminderList" class="reminder-list"></div>
        </section>
      </form>
    </dialog>
    <dialog id="settingsDialog" class="settings-dialog">
      <form method="dialog" class="settings-card">
        <header class="settings-heading">
          <div>
            <h2>设置</h2>
            <p>调整 Notice Note 的使用偏好</p>
          </div>
          <button id="closeSettingsDialogButton" class="reminder-manager-close" type="button" title="关闭" aria-label="关闭">×</button>
        </header>
        <section class="settings-section">
          <div class="settings-item">
            <div class="settings-item-copy">
              <strong>工作日随机回顾</strong>
              <p>周一至周五，每天从没有待提醒的提醒文件中随机选择一篇，标记为“今日回顾”。</p>
            </div>
            <label class="settings-switch" title="启用工作日随机回顾">
              <input id="dailyReviewEnabledInput" type="checkbox">
              <span aria-hidden="true"></span>
            </label>
          </div>
          <div class="daily-review-current">
            <span>今日回顾</span>
            <strong id="dailyReviewCurrentTitle">尚未选择</strong>
          </div>
          <div class="settings-storage-card">
            <div class="settings-storage-heading">
              <div>
                <strong>存储位置</strong>
                <p>笔记、附件和资料文件所在的根目录</p>
              </div>
            </div>
            <code id="settingsStoragePath" class="settings-storage-path"></code>
            <div class="settings-storage-actions">
              <button id="chooseStorageButton" class="secondary-button" type="button">更改位置</button>
              <button id="resetStorageButton" class="secondary-button" type="button">恢复默认</button>
            </div>
          </div>
        </section>
      </form>
    </dialog>
    <script src="./vendor/editor.bundle.js"></script>
    <script src="./renderer.js"></script>
  </body>
</html>
